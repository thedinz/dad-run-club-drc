services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: drc
      POSTGRES_USER: drc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - drc-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drc -d drc"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/thedinz/dad-run-club-drc-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://drc:${POSTGRES_PASSWORD}@postgres:5432/drc
      API_PORT: 4000
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      SEED_INVITE_CODE: ${SEED_INVITE_CODE:-DRC-FOUNDERS}
      CORS_ORIGIN: "${CORS_ORIGIN:-*}"
      MEDIA_STORAGE_PATH: /data/media
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      INSTAGRAM_USERNAME: ${INSTAGRAM_USERNAME:-dadrunclubplymouth}
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN:-}
      INSTAGRAM_USER_ID: ${INSTAGRAM_USER_ID:-}
      INSTAGRAM_GRAPH_BASE_URL: ${INSTAGRAM_GRAPH_BASE_URL:-https://graph.facebook.com/v20.0}
    volumes:
      - drc-media:/data/media
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ghcr.io/thedinz/dad-run-club-drc-web:latest
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:4000
      NEXT_PUBLIC_API_URL: /api/backend
    ports:
      - "${WEB_PORT:-6464}:3000"
    depends_on:
      - api

volumes:
  drc-postgres:
  drc-media:
