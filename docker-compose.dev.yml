services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: drc
      POSTGRES_USER: drc
      POSTGRES_PASSWORD: drc
    ports:
      - "5432:5432"
    volumes:
      - drc-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drc -d drc"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/thedinz/dad-run-club-drc-api:local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://drc:drc@postgres:5432/drc
      API_PORT: 4000
      JWT_SECRET: local-dev-jwt-secret-change-me
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      ADMIN_TOKEN: ""
      SEED_INVITE_CODE: DRC-FOUNDERS
      CORS_ORIGIN: "*"
      MEDIA_STORAGE_PATH: /data/media
      MAX_UPLOAD_BYTES: 10485760
      INSTAGRAM_USERNAME: dadrunclubplymouth
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN:-}
      INSTAGRAM_USER_ID: ${INSTAGRAM_USER_ID:-}
      INSTAGRAM_GRAPH_BASE_URL: ${INSTAGRAM_GRAPH_BASE_URL:-https://graph.facebook.com/v20.0}
    ports:
      - "4000:4000"
    volumes:
      - drc-media:/data/media
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ghcr.io/thedinz/dad-run-club-drc-web:local
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      API_INTERNAL_URL: http://api:4000
      NEXT_PUBLIC_API_URL: /api/backend
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  drc-postgres:
  drc-media:
